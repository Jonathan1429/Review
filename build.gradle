// Top-level build file where you can add configuration options common to all sub-projects/modules.
buildscript {
    // ext.kotlin_version = '2.0.0-Beta1'
    ext.kotlin_version = '2.0.20'

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        // classpath 'com.android.tools.build:gradle:8.2.2'
        classpath 'com.android.tools.build:gradle:8.5.2'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
        //classpath("org.jetbrains.kotlinx:kover-gradle-plugin:0.9.1")
        // classpath "android.arch.navigation:navigation-safe-args-gradle-plugin:2.4.2"
        //classpath 'com.android.tools.build:gradle:7.4.2'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}
plugins {
    id 'com.google.dagger.hilt.android' version '2.48' apply false
    // id 'androidx.navigation.safeargs' version '2.4.2' apply false
    // id 'com.android.tools.build:gradle' version "8.5.2" apply false
}
task clean(type: Delete) {
    delete rootProject.buildDir
}