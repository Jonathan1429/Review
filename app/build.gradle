import org.gradle.testing.jacoco.plugins.JacocoTaskExtension

// Configura **todas** las tareas de unit test** para que vuelquen su coverage aquí:
/*tasks.withType(Test).configureEach {
    // Cada task escribirá un archivo ${buildDir}/jacoco/${taskName}.exec
    jacoco.destinationFile = file("$buildDir/jacoco/${name}.exec")
}*/

tasks.register("createJacocoDir") {
    doLast {
        mkdir("$buildDir/jacoco")
    }
}

tasks.withType(Test).configureEach { Test t ->
    // 1) asegúrate de crear la carpeta antes de correr tests
    t.dependsOn("createJacocoDir")
    // 2) si usas Kotlintest/JUnit5
    t.useJUnitPlatform()
    // 3) configura el archivo .exec via la extensión JaCoCo
    t.extensions.getByType(JacocoTaskExtension).destinationFile =
            file("$buildDir/jacoco/${t.name}.exec")
}

android {
    compileSdk 34

    defaultConfig {
        applicationId "com.jonathanev.review"
        // minSdk 21
        minSdk 26
        targetSdk 34
        versionCode 13
        versionName "2.4"

        // Sin DaggerHilt
        // testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        // Con DaggerHilt
        //testInstrumentationRunner "com.jonathanev.review.CustomTestRunner"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    // Creación de un segundo Manifest para pruebas
    sourceSets {
        androidTest {
            manifest.srcFile 'src/androidTest/AndroidManifest.xml'
        }
    }

    buildTypes {
        release {
            minifyEnabled true // Optimisation, reduction, ofuscation
            shrinkResources true // Reduction about resources (Image)
            debuggable false
            resValue("string", "nameApp", "Review")
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.debug
        }

        debug {
            minifyEnabled false // Optimisation, reduction, ofuscation
            debuggable true
            resValue("string", "nameApp", "Review [DEBUG]")

            testCoverageEnabled true // Habilita cobertura en AndroidTest
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    buildFeatures {
        dataBinding true
        viewBinding true
    }

    android {
        packagingOptions {
            resources.excludes.add("META-INF/*")
        }
    }

    android {
        buildFeatures {
            buildConfig = true
        }
    }

    testOptions {
        unitTests.all { unitTestTask ->
            // si usas Kotlintest/JUnit5:
            unitTestTask.useJUnitPlatform()

            // asegúrate de que exista la carpeta
            unitTestTask.doFirst {
                file("$buildDir/jacoco").mkdirs()
            }

            // ← aquí configuramos el .exec a través de la extensión de Jacoco
            unitTestTask.extensions.configure(
                    JacocoTaskExtension
            ) { jacocoExt ->
                jacocoExt.destinationFile = file(
                        "$buildDir/jacoco/${unitTestTask.name}.exec"
                )
            }
        }
    }

    /*testOptions {
        execution 'ANDROIDX_TEST_ORCHESTRATOR' // ← NECESARIO para que se genere el coverage.ec
    }*/

    namespace 'com.jonathanev.review'
}

