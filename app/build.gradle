plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'

    // Necesario para Dagger Hilt
    id 'kotlin-kapt' // A traves de las anotaciones genera el código por atrás.
    id 'com.google.dagger.hilt.android'

    // Serializable
    id 'org.jetbrains.kotlin.plugin.serialization'

    // Test con jacoco - Reporte
    id 'jacoco'

    // @Parcelize
    id 'kotlin-parcelize'

    // 🔑 CLAVE: Aplicar el plugin aquí.
    //id 'org.jetbrains.kotlinx.kover'
}

android {
    compileSdk 35

    defaultConfig {
        applicationId "com.jonathanev.review"
        // minSdk 21
        minSdk 26
        targetSdk 35
        versionCode 14
        versionName "2.5"

        // Con TestRunner personalizado, falta investigar mas este punto
        //testInstrumentationRunner "com.jonathanev.review.CustomTestRunner"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled true // Optimisation, reduction, ofuscation
            shrinkResources true // Reduction about resources (Image)
            debuggable false
            resValue("string", "nameApp", "Review")
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.debug
        }

        debug {
            minifyEnabled false // Optimisation, reduction, ofuscation
            debuggable true
            resValue("string", "nameApp", "Review [DEBUG]")

            enableAndroidTestCoverage true
            testCoverageEnabled true // Habilita cobertura en AndroidTest
            enableUnitTestCoverage true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    buildFeatures {
        dataBinding true
        viewBinding true
        buildConfig = false
    }

    android {
        packagingOptions {
            resources.excludes.add("META-INF/*")
        }
    }

    testOptions {
        unitTests.all { unitTestTask ->
            // asegúrate de que exista la carpeta
            unitTestTask.doFirst {
                file("${buildDir}/jacoco").mkdirs()
            }

            // ← aquí configuramos el .exec a través de la extensión de Jacoco
            unitTestTask.extensions.configure(
                    JacocoTaskExtension
            ) { jacocoExt ->
                jacocoExt.destinationFile = file(
                        "${buildDir}/jacoco/${unitTestTask.name}.exec"
                )
            }
        }
    }

    namespace 'com.jonathanev.review'
}

dependencies {
    String daggerHilt = "2.48"
