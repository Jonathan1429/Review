plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'

    // Necesario para Dagger Hilt
    id 'kotlin-kapt' // A traves de las anotaciones genera el código por atrás.
    id 'com.google.dagger.hilt.android'
    // id 'androidx.navigation.safeargs.kotlin'

    // Test con Coverage
    id("org.jetbrains.kotlinx.kover") version "0.9.1"
}

android {
    compileSdk 34

    defaultConfig {
        applicationId "com.jonathanev.review"
        // minSdk 21
        minSdk 26
        targetSdk 34
        versionCode 13
        versionName "2.4"

        // Sin DaggerHilt
        // testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        // Con DaggerHilt
        testInstrumentationRunner "com.jonathanev.review.CustomTestRunner"
    }

    // Creación de un segundo Manifest para pruebas
    sourceSets {
        androidTest {
            manifest.srcFile 'src/androidTest/AndroidManifest.xml'
        }
    }

    buildTypes {
        release {
            minifyEnabled true // Optimisation, reduction, ofuscation
            shrinkResources true // Reduction about resources (Image)
            debuggable false
            resValue("string", "nameApp", "Review")
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.debug
        }

        debug {
            minifyEnabled false // Optimisation, reduction, ofuscation
            debuggable true
            resValue("string", "nameApp", "Review [DEBUG]")

            testCoverageEnabled true // Habilita cobertura en AndroidTest
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    buildFeatures {
        dataBinding true
        viewBinding true
    }

    android {
        packagingOptions {
            resources.excludes.add("META-INF/*")
        }
    }

    android {
        buildFeatures {
            buildConfig = true
        }
    }

    /*testOptions {
        unitTests.returnDefaultValues = true
    }*/

    namespace 'com.jonathanev.review'
}

dependencies {
    String daggerHilt = "2.48"
    String mockkVersion = "1.13.12"

    // Cargar imágenes en el activity.
    implementation("androidx.activity:activity-ktx:1.8.2")

    implementation 'androidx.appcompat:appcompat:1.4.1'
    implementation 'com.google.android.material:material:1.5.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.3'

    // ViewModel
    implementation "androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0"

    // Activity ViewModel
    implementation "androidx.activity:activity-ktx:1.8.2"

    // Fragments ViewModel
    implementation "androidx.fragment:fragment-ktx:1.6.2"

    // Mock
    testImplementation("io.mockk:mockk:1.13.8")

    // Dagger Hilt
    implementation "com.google.dagger:hilt-android:$daggerHilt"
    kapt "com.google.dagger:hilt-compiler:$daggerHilt"
    kapt "com.google.dagger:hilt-android-testing:2.48"

    //implementation 'androidx.appcompat:appcompat:1.6.1'
    //implementation 'com.google.android.material:material:1.9.0'
    //implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.legacy:legacy-support-v4:1.0.0'

    // Libreria de colores
    implementation 'com.github.yukuku:ambilwarna:2.0.1'

    // Librería de rueda de colores
    implementation "com.github.skydoves:colorpickerview:2.2.4"

    // Pasar arreglos entre actividades.
    implementation 'org.parceler:parceler-api:1.1.12'

    // Anuncios publicitarios
    implementation 'com.google.android.gms:play-services-ads:23.2.0'

    // Zoom en la imagen
    //implementation 'com.github.MikeOrtiz:TouchImageView:1.4.1' // last SupportLib version
    implementation 'com.davemorrissey.labs:subsampling-scale-image-view:3.10.0'

    // Cargar la imagen
    //implementation 'com.github.bumptech.glide:glide:4.12.0'

    // DataStore
    implementation 'androidx.datastore:datastore-preferences:1.1.1'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'

    // UnitTesting
    testImplementation 'junit:junit:4.13.2'
    testImplementation("io.kotlintest:kotlintest-runner-junit5:3.4.2")

    testImplementation("io.mockk:mockk:1.13.12")
    testImplementation("io.mockk:mockk-agent:1.13.12")

    kapt 'com.google.dagger:hilt-android-compiler:2.48'

    androidTestImplementation 'com.google.dagger:hilt-android-testing:2.48'
    kaptAndroidTest 'com.google.dagger:hilt-android-compiler:2.48'

    // UITesting
    androidTestImplementation("androidx.test.ext:junit:1.2.1")
    androidTestImplementation("androidx.test.espresso:espresso-core:3.6.1")
    androidTestImplementation("androidx.test.espresso:espresso-contrib:3.6.1")
    androidTestImplementation("androidx.test.espresso:espresso-intents:3.6.1")
    androidTestImplementation("com.google.dagger:hilt-android-testing:2.52")
    androidTestImplementation("androidx.fragment:fragment-testing:1.8.2")
    kaptTest("com.google.dagger:hilt-android-compiler:2.52")

    androidTestImplementation "io.mockk:mockk-android:${mockkVersion}"
    androidTestImplementation "io.mockk:mockk-agent:${mockkVersion}"
}

// Configuración para Kover
kover {
    // reportFormats = ['html', 'xml']
}

tasks.register('mergeAndroidTestCoverage') {
    group = "verification"
    description = "Combina la cobertura de pruebas de AndroidTest con Kover"

    doLast {
        // Usar Path de Java para manejar rutas de manera más confiable
        def coverageDir = layout.buildDirectory.dir("coverage").get().asFile

        // Crear la carpeta si no existe
        if (!coverageDir.exists()) {
            coverageDir.mkdirs()  // Usar método Groovy para crear el directorio
        }

        // Copiar los archivos de cobertura generados en connectedAndroidTest
        fileTree(layout.buildDirectory.dir("outputs/code-coverage/connected").get().asFile).matching {
            include "**/*.ec"
        }.each { file ->
            copy {
                from file
                into coverageDir
            }
        }
    }
}