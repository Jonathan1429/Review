// 1) Primero limpia y corre solo unit tests:
tasks.register("jacocoTestReport", JacocoReport) {
    group = "verification"
    description = "Combina cobertura de unit tests e AndroidTest en un único reporte"

    // para arrancar el .exec de unit y el .ec de instrumented:
    dependsOn("testDebugUnitTest", "connectedDebugAndroidTest")

    executionData.setFrom(
            fileTree("$buildDir/jacoco")      { include("*.exec") },
            fileTree("$buildDir/outputs/code_coverage/debugAndroidTest/connected") {
                include("**/coverage.ec")
            }
    )

    def javaClasses = fileTree("$buildDir/intermediates/javac/debug/classes") {
        exclude("**/R*.class", "**/BuildConfig.*", "**/Manifest*.*")
    }
    def kotlinClasses = fileTree("$buildDir/tmp/kotlin-classes/debug") {
        exclude("**/R*.class", "**/BuildConfig.*", "**/Manifest*.*")
    }
    classDirectories.setFrom(javaClasses + kotlinClasses)
    sourceDirectories.setFrom(files("src/main/java", "src/main/kotlin"))

    reports {
        xml.required.set(true)
        html.required.set(true)
    }
}


// Configuración de la dependencia CLI
// Configuración del CLI de Kover (para coverage de unit tests)
// 1) Configura el CLI de Kover si no lo tienes ya
configurations {
    koverCli {
        canBeConsumed = false
        canBeResolved = true
    }
}

dependencies {
    koverCli "org.jetbrains.kotlinx:kover-cli:0.9.1"
}

// Función para obtener la ruta al JAR
def cliJar = { configurations.koverCli.singleFile }

// 2) Task único que corre tests y genera reporte combinado
task generateMergedCoverage {
    group = "verification"
    description = "Ejecuta tests (unit + android), fusiona cobertura y genera reporte"

    // 1º asegúrate de ejecutar ambos tests
    dependsOn "connectedDebugAndroidTest", "testDebugUnitTest"

    doLast {
        // Directorio temporal donde copiaremos .ec + .ic
        def tempCovDir = file("$buildDir/coverageTmp")
        tempCovDir.deleteDir()
        tempCovDir.mkdirs()

        // Copiamos el .ec de AndroidTest (busca recursivamente cualquier coverage.ec)
        copy {
            from fileTree("$buildDir/outputs/code_coverage/debugAndroidTest/connected") {
                include "**/coverage.ec"
            }
            into tempCovDir
        }
        // Copiamos el .ic de unit tests
        copy {
            from file("$buildDir/kover/bin-reports/testDebugUnitTest.ic")
            into tempCovDir
        }

        // 2º Fusionar ambos en merged-report.ic
        def mergeArgs = [
                "java", "-jar", cliJar().absolutePath,
                "merge"
        ]
        // Añadimos cada .ec y .ic al array de args
        fileTree(tempCovDir).matching { include "*.ec", "*.ic" }.files.each { f ->
            mergeArgs << f.absolutePath
        }
        mergeArgs << "--target" << "$buildDir/kover/merged-report.ic"

        exec {
            commandLine mergeArgs
        }

        // 3º Generar HTML + XML
        def reportArgs = [
                "java", "-jar", cliJar().absolutePath,
                "report",
                "$buildDir/kover/merged-report.ic",
                "--classfiles", "$buildDir/intermediates/javac/debug/classes",
                "--classfiles", "$buildDir/tmp/kotlin-classes/debug",
                "--src", "src/main/java",
                "--src", "src/main/kotlin",
                "--html", "$buildDir/reports/coverage/merged-html",
                "--xml", "$buildDir/reports/coverage/merged.xml",
                "--title", "Cobertura combinada"
        ]

        exec {
            commandLine reportArgs
        }

        println "\n✅ Reporte combinado listo:\n" +
                "  • HTML → ${buildDir}/reports/coverage/merged-html/index.html\n" +
                "  • XML  → ${buildDir}/reports/coverage/merged.xml\n"
    }
}


