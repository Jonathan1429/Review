// Configuración de Jacoco
// ========================================
// 1. Configuración general de Jacoco
// ========================================
jacoco {
    toolVersion = "0.8.12"
    reportsDirectory = layout.buildDirectory.dir("customJacocoReportDir")
}

// ========================================
// 0. Variables y filtros Jacoco
// ========================================
def coverageExclusions = [
        // Exclusiones estándar y de código generado
        '**/R.class',
        '**/R$*.class',
        '**/BuildConfig.*',
        '**/Manifest*.*',
        '**/*_Impl.*',
        '**/*$Lambda$*.class',
        '**/databinding/**',
        '**/BR.class',
        '**/DataBinderMapperImpl.class',
        '**/*Module.class',
        '**/*Factory.class',
]

// Directorios de código fuente para el reporte HTML
def appSourceDirss = files(android.sourceSets.main.java.srcDirs, android.sourceSets.main.kotlin.srcDirs)

// ========================================
// 1. Tarea para Transferir .ec de AndroidTest a .exec
// ========================================
tasks.register("transferAndroidCoverageData") {
    group = "Reporting"
    description = "Mueve el archivo .ec de AndroidTest a un archivo .exec fijo para Jacoco."

    dependsOn "connectedDebugAndroidTest"

    doLast {
        def ecFiles = fileTree("$buildDir/outputs/code_coverage/debugAndroidTest/connected") {
            include("**/*.ec")
        }.files

        if (ecFiles.isEmpty()) {
            println "⚠️ Advertencia: No se encontró el archivo .ec de AndroidTest. Los tests deben ejecutarse primero."
            return
        }

        def ecFile = ecFiles.first()
        def targetExec = file("$buildDir/jacoco/androidTest.exec")

        copy {
            from ecFile
            into targetExec.parentFile
            rename { targetExec.name }
        }

        println "✅ Archivo .ec copiado/transferido a: ${targetExec}"
    }
}


// ========================================
// 2. Reporte Completo Combinado (Unit + Android Tests)
// ========================================
tasks.register("fullCoverageReport", JacocoReport) {
    group = "Reporting"
    description = "Genera el reporte de cobertura combinado (Unit + Android Tests)."

    dependsOn "testDebugUnitTest", "transferAndroidCoverageData"

    executionData.setFrom(
            file("$buildDir/jacoco/testDebugUnitTest.exec"),
            file("$buildDir/jacoco/androidTest.exec")
    )

    // Directorios de clases compiladas (Java + Kotlin) con exclusión de la capa View
    classDirectories.setFrom(
            fileTree("$buildDir/intermediates/javac/debug/classes") {
                exclude coverageExclusions
                exclude "com/jonathanev/review/UI/View/**"
            },
            fileTree("$buildDir/tmp/kotlin-classes/debug") {
                exclude coverageExclusions
                exclude "com/jonathanev/review/UI/View/**"
            }
    )

    sourceDirectories.setFrom(appSourceDirss)

    reports {
        html.required.set(true)
        html.outputLocation.set(file("$buildDir/reports/jacoco/fullReport/html"))
        xml.required.set(true)
        xml.outputLocation.set(file("$buildDir/reports/jacoco/fullReport/report.xml"))
    }

    doLast {
        println "✅ Reporte completo generado (sin incluir View Layer)."
    }
}

